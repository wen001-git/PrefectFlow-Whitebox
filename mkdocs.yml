# MkDocs configuration.
# Renders the bilingual whitebox site from YAML metadata under
# validators/ and sheets/.

site_name: PrefectFlow Whitebox
site_description: Whitebox documentation of the remit_validation pipeline
site_url: ""
use_directory_urls: false

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - macros
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true

nav:
  - Home: index.md
  - Project status:
      - Servicers registry: _status/servicers-registry.md
  - Conventions:
      - Registry: conventions/registry.md
      - SQL whitebox: conventions/sql-whitebox.md
      - Business rules: conventions/rules-whitebox.md
  - Servicers:
      - MRC:
          - Scope: servicers/mrc/scope.md
          - Chapter TOC: mrc/1.0-toc.md
          - 1.1 Raw data: mrc/1.1-rawdata.md
          - 1.2 Dataflow: mrc/1.2-dataflow.md
          - 1.3 Sheets: mrc/1.3-sheets.md
          - 1.4 Fields: mrc/1.4-fields.md
          - 1.5 Rules: mrc/1.5-rules.md
          - 1.6 Baseline: mrc/1.6-baseline.md
  - Pending servicers:
      - Arvest: arvest/_pending.md
      - CC5: cc5/_pending.md
      - Selene: selene/_pending.md
      - SLS: sls/_pending.md
      - Scattered (cross-servicer): scattered/_pending.md
      - Cross-servicer dataflow: dataflow/_pending.md
  # Validators / Sheets / Lineage / Known deltas nav entries are added
  # during Phase 1 once tools/autodoc.py generates them.
