sheet: MRC_Advance_Check
business_meaning_en: |
  Loan-level advance-balance reconciliation for MRC. For each loan, escrow / recoverable
  corp / non-recoverable corp advance balances are compared between remit (portmonth _chg
  fields) and daily snapshot (curr - prev month-end). Non-zero "_diff_remitvsdaily" =
  potential servicer reporting issue.
business_meaning_zh: |
  MRC 贷款级 advance 余额对账。每笔贷款：escrow / 可回收 corp / 不可回收 corp advance
  在 remit（portmonth _chg 字段）与 daily 快照（当月末 - 上月末）之间比对。
  "_diff_remitvsdaily" 非零 = servicer 上报可能有问题。
producing_validators:
  - mrc/check_adv_balance
columns:
  loanid:
    type: string
    rule_en: "Internal loan id (join key)."
    rule_zh: "内部 loan id（关联键）。"
    related_validator: mrc/check_adv_balance
  mrc_ln:
    type: string
    rule_en: "MRC servicer loan number (portmonth.svcloanid)."
    rule_zh: "MRC servicer 贷款号（portmonth.svcloanid）。"
    related_validator: mrc/check_adv_balance
  dealid:
    type: string
    rule_en: "Deal id; portmonth first, falls back to portfunding."
    rule_zh: "Deal id；优先 portmonth，缺则 portfunding。"
    related_validator: mrc/check_adv_balance
  delq_status:
    type: string
    rule_en: "Delinquency status from prior month-end daily snapshot."
    rule_zh: "拖欠状态，取自上月末 daily 快照。"
    related_validator: mrc/check_adv_balance
  escrowadv_prev_daily:
    type: decimal
    format: currency
    rule_en: "Escrow advance balance at prior month-end (coalesce to 0)."
    rule_zh: "上月末 escrow advance 余额（缺则 0）。"
    related_validator: mrc/check_adv_balance
  escrowadv_curr_daily:
    type: decimal
    format: currency
    rule_en: "Escrow advance balance at current month-end (coalesce to 0)."
    rule_zh: "当月末 escrow advance 余额（缺则 0）。"
    related_validator: mrc/check_adv_balance
  escrowadv_chg_daily:
    type: decimal
    format: currency
    rule_en: "escrowadv_curr_daily − escrowadv_prev_daily; null if either daily side is missing."
    rule_zh: "escrowadv_curr_daily − escrowadv_prev_daily；任一 daily 侧缺则空。"
    related_validator: mrc/check_adv_balance
  escadv_remit:
    type: decimal
    format: currency
    rule_en: "Servicer-reported escrow advance change (portmonth.escrowadv_chg, coalesce to 0)."
    rule_zh: "Servicer 上报 escrow advance 变动（portmonth.escrowadv_chg，缺则 0）。"
    related_validator: mrc/check_adv_balance
  escadv_diff_remitvsdaily:
    type: decimal
    format: currency
    rule_en: "escrowadv_chg_daily + escadv_remit. Non-zero highlighted (sign convention: remit reports change as outflow)."
    rule_zh: "escrowadv_chg_daily + escadv_remit。非零高亮（符号约定：remit 把变动当流出）。"
    related_validator: mrc/check_adv_balance
  reccorpadvance_prev_daily:
    type: decimal
    format: currency
    rule_en: "Recoverable corp advance balance at prior month-end (coalesce to 0)."
    rule_zh: "上月末可回收 corp advance 余额（缺则 0）。"
    related_validator: mrc/check_adv_balance
  reccorpadvance_curr_daily:
    type: decimal
    format: currency
    rule_en: "Recoverable corp advance balance at current month-end (coalesce to 0)."
    rule_zh: "当月末可回收 corp advance 余额（缺则 0）。"
    related_validator: mrc/check_adv_balance
  reccorpadvance_chg_daily:
    type: decimal
    format: currency
    rule_en: "curr − prev daily; null if either daily side is missing."
    rule_zh: "curr − prev daily；任一 daily 侧缺则空。"
    related_validator: mrc/check_adv_balance
  reccorpadvance_remit:
    type: decimal
    format: currency
    rule_en: "Servicer-reported recoverable corp advance change (portmonth.corpadvrec_chg, coalesce 0)."
    rule_zh: "Servicer 上报可回收 corp advance 变动（portmonth.corpadvrec_chg，缺则 0）。"
    related_validator: mrc/check_adv_balance
  recovcorpadv_diff_remitvsdaily:
    type: decimal
    format: currency
    rule_en: "reccorpadvance_chg_daily + reccorpadvance_remit. Non-zero highlighted."
    rule_zh: "reccorpadvance_chg_daily + reccorpadvance_remit。非零高亮。"
    related_validator: mrc/check_adv_balance
  nonrecovcorpadv_prev_daily:
    type: decimal
    format: currency
    rule_en: "Non-recoverable corp advance balance at prior month-end (coalesce to 0)."
    rule_zh: "上月末不可回收 corp advance 余额（缺则 0）。"
    related_validator: mrc/check_adv_balance
  nonrecovcorpadv_curr_daily:
    type: decimal
    format: currency
    rule_en: "Non-recoverable corp advance balance at current month-end (coalesce to 0)."
    rule_zh: "当月末不可回收 corp advance 余额（缺则 0）。"
    related_validator: mrc/check_adv_balance
  nonrecovcorpadv_chg_daily:
    type: decimal
    format: currency
    rule_en: "curr − prev daily; null if either daily side is missing."
    rule_zh: "curr − prev daily；任一 daily 侧缺则空。"
    related_validator: mrc/check_adv_balance
  nonrecovadvance_remit:
    type: decimal
    format: currency
    rule_en: "Servicer-reported non-recoverable corp advance change (portmonth.corpadvnonrec_chg, coalesce 0)."
    rule_zh: "Servicer 上报不可回收 corp advance 变动（portmonth.corpadvnonrec_chg，缺则 0）。"
    related_validator: mrc/check_adv_balance
  nonrecovcorpadv_diff_remitvsdaily:
    type: decimal
    format: currency
    rule_en: "nonrecovcorpadv_chg_daily + nonrecovadvance_remit. Non-zero highlighted."
    rule_zh: "nonrecovcorpadv_chg_daily + nonrecovadvance_remit。非零高亮。"
    related_validator: mrc/check_adv_balance
  totalcorpadv_prev_daily:
    type: decimal
    format: currency
    rule_en: "reccorpadvance_prev_daily + nonrecovcorpadv_prev_daily."
    rule_zh: "reccorpadvance_prev_daily + nonrecovcorpadv_prev_daily。"
    related_validator: mrc/check_adv_balance
  totalcorpadv_curr_daily:
    type: decimal
    format: currency
    rule_en: "reccorpadvance_curr_daily + nonrecovcorpadv_curr_daily."
    rule_zh: "reccorpadvance_curr_daily + nonrecovcorpadv_curr_daily。"
    related_validator: mrc/check_adv_balance
  totalcorpadv_chg_daily:
    type: decimal
    format: currency
    rule_en: "totalcorpadv_curr_daily − totalcorpadv_prev_daily; null if either daily side missing."
    rule_zh: "totalcorpadv_curr_daily − totalcorpadv_prev_daily；任一 daily 侧缺则空。"
    related_validator: mrc/check_adv_balance
  totalcorpadvance_remit:
    type: decimal
    format: currency
    rule_en: "Servicer-reported total corp adv change: coalesce(portmonth.corpadvtotal_chg, corpadvrec_chg + corpadvnonrec_chg)."
    rule_zh: "Servicer 上报 corp adv 总变动：coalesce(portmonth.corpadvtotal_chg, corpadvrec_chg + corpadvnonrec_chg)。"
    related_validator: mrc/check_adv_balance
  totalcorpadv_diff_remitvsdaily:
    type: decimal
    format: currency
    rule_en: "totalcorpadv_chg_daily + totalcorpadvance_remit. Non-zero highlighted."
    rule_zh: "totalcorpadv_chg_daily + totalcorpadvance_remit。非零高亮。"
    related_validator: mrc/check_adv_balance
  escrow_balance_prev:
    type: decimal
    format: currency
    rule_en: "Escrow balance at prior month-end (basic_data_daily_loan_common.escrowbalance, coalesce 0)."
    rule_zh: "上月末 escrow 余额（basic_data_daily_loan_common.escrowbalance，缺则 0）。"
    related_validator: mrc/check_adv_balance
  escrow_balance_curr:
    type: decimal
    format: currency
    rule_en: "Escrow balance at current month-end (basic_data_daily_loan_common.escrowbalance, coalesce 0)."
    rule_zh: "当月末 escrow 余额（basic_data_daily_loan_common.escrowbalance，缺则 0）。"
    related_validator: mrc/check_adv_balance
  asofdate:
    type: date
    rule_en: "Remit date (set in Python after SQL)."
    rule_zh: "Remit 日期（SQL 后在 Python 中赋值）。"
    related_validator: mrc/check_adv_balance
