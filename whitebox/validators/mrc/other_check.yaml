id: mrc/other_check
servicer: mrc
name: other_check
title_en: "MRC Advance Info (3rd party / corp / escrow buckets MoM)"
title_zh: "MRC Advance 明细（第三方 / corp / escrow 桶 MoM）"
description_en: |
  Bucketed advance amounts at the description+transaction_code level for three advance
  categories (non-recoverable corp, recoverable corp, escrow), with prior-month MoM
  ratio. Used by ops to investigate unusual movements.
description_zh: |
  对三类 advance（不可回收 corp、可回收 corp、escrow）按 description + 交易代码维度
  做分桶聚合，并与前一月做 MoM 比较。运维用来排查异常变动。
related_sheets:
  - MRC_Adv_Info
source_tables:
  - mrc.portmrcremit3rdpartyadvances
  - mrc.portmrcremitcorpadvances
  - mrc.portmrcremitescrowadvances
source_citation: "flow/remit_validation/mrc_validation.py:136"
rule_en: |
  For current and prior fctrdt, run a UNION of three bucketed aggregates:
  (1) nonrecovcorpadv: sum(advances + recoveries) from portmrcremit3rdpartyadvances grouped by (description, tran_code);
  (2) recovcorpadv: same metric from portmrcremitcorpadvances grouped by (reason, tran_code);
  (3) escadv: sum(total_activity) from portmrcremitescrowadvances grouped by (cat, disbursement_code).
  Then merge current + prior on (bucket, description, transaction_code) in pandas and compute amt_MoM = amt / amt_1m - 1.
rule_zh: |
  当期与前期 fctrdt 各跑一次三段 UNION 聚合：
  (1) nonrecovcorpadv：从 portmrcremit3rdpartyadvances 按 (description, tran_code) 求 sum(advances+recoveries)；
  (2) recovcorpadv：从 portmrcremitcorpadvances 按 (reason, tran_code) 求同一指标；
  (3) escadv：从 portmrcremitescrowadvances 按 (cat, disbursement_code) 求 sum(total_activity)。
  之后在 pandas 中按 (bucket, description, transaction_code) merge 当期与前期，计算
  amt_MoM = amt / amt_1m - 1。
rule_business_impact_en: "Large MoM swings prompt ops to query unusual transaction codes."
rule_business_impact_zh: "MoM 大幅波动促使运维排查异常交易代码。"
sql_file: null    # Filled in mrc-v5-doc; note v5 is the only validator that does post-SQL pandas merge
tags:
  - mrc
